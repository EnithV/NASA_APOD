<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <title>NASA APOD</title>
  <!-- Precarga de fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <!-- Bootstrap 5.3.8 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Font Awesome 6.5.0 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Fondo animado del espacio -->
  <div class="space-bg" aria-hidden="true"></div>

  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark site-nav sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <span class="brand-icon"><i class="fa-solid fa-user-astronaut"></i></span>
        <span class="brand-text">NASA <span class="brand-accent">APOD</span></span>
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <span class="navbar-text d-none d-md-inline badge-api">
          <i class="fa-solid fa-satellite-dish me-1"></i> <span data-i18n="openApi">Open API</span>
        </span>
        <div class="lang-switch d-flex gap-1" role="group" aria-label="Language">
          <button type="button" class="lang-pill" data-lang="en">EN</button>
          <button type="button" class="lang-pill" data-lang="es">ES</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Cabecera -->
  <header class="hero-section text-center">
    <div class="container">
      <p class="hero-eyebrow mb-2">
        <i class="fa-solid fa-star me-1"></i> <span data-i18n="heroEyebrow"></span>
      </p>
      <h1 class="hero-title" data-i18n="heroTitle" data-i18n-html></h1>
      <p class="hero-lead mx-auto" data-i18n="heroLead"></p>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="container flex-grow-1 pb-5">
    <div class="row justify-content-center g-4">
      <div class="col-12 col-lg-10 col-xl-9">

        <!-- Panel de selección de fecha -->
        <div class="glass-panel date-panel mb-4">
          <div class="row align-items-end g-3">
            <div class="col-md-8">
              <label for="fecha-nasa" class="form-label panel-label">
                <i class="fa-regular fa-calendar me-2"></i><span data-i18n="dateLabel"></span>
              </label>
              <div class="input-group">
                <!-- Botón día anterior -->
                <button class="btn btn-outline-light" type="button" id="btn-anterior" aria-label="Día anterior">
                  <i class="fa-solid fa-chevron-left"></i>
                </button>
                <input type="date" class="form-control form-control-lg date-input" id="fecha-nasa" />
                <!-- Botón día siguiente -->
                <button class="btn btn-outline-light" type="button" id="btn-siguiente" aria-label="Día siguiente">
                  <i class="fa-solid fa-chevron-right"></i>
                </button>
              </div>
            </div>
            <div class="col-md-4">
              <button type="button" class="btn btn-nasa w-100 btn-lg" id="btn-hoy">
                <i class="fa-solid fa-rocket me-2"></i><span data-i18n="btnToday"></span>
              </button>
            </div>
          </div>
        </div>

        <!-- Artículo del APOD (se actualiza dinámicamente) -->
        <article class="glass-panel apod-panel overflow-hidden" id="img-dia" aria-live="polite">
          <div class="apod-placeholder text-center py-5">
            <div class="spinner-border text-info" role="status"></div>
            <p class="mt-3 text-secondary mb-0" data-i18n="loading"></p>
          </div>
        </article>

      </div>
    </div>

    <!-- Sección de favoritos -->
    <section class="favorites-section mt-5 pt-2" id="contenedorFavoritos">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
          <div>
            <h2 class="section-title mb-1">
              <i class="fa-solid fa-heart text-danger me-2"></i><span data-i18n="favoritesTitle"></span>
            </h2>
            <p class="section-subtitle mb-0" data-i18n="favoritesSubtitle"></p>
          </div>
          <span class="badge rounded-pill favorites-count" id="favoritos-count">0</span>
        </div>
        <div id="listaFavoritos" class="row g-4"></div>
      </div>
    </section>
  </main>

  <!-- Pie de página -->
  <footer class="site-footer mt-auto">
    <div class="container text-center">
      <div class="footer-badges d-flex flex-wrap justify-content-center gap-2 mb-3">
        <span class="footer-pill"><i class="fa-solid fa-satellite-dish me-1"></i> NASA Open APIs</span>
        <span class="footer-pill"><i class="fa-regular fa-image me-1"></i> APOD</span>
      </div>
      <p class="footer-team mb-0">
        <i class="fa-solid fa-user-astronaut me-1"></i> <span data-i18n="footerAuthor"></span>
      </p>
    </div>
  </footer>

  <!-- Contenedor de notificaciones toast -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toast-nasa" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toast-nasa-body"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" data-i18n-aria="close"></button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
